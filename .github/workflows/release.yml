name: Build & Release Installer

on:
  repository_dispatch:
    types: [launcher-released]

  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del launcher (ej: 1.1.4)'
        required: true
        default: ''
      tag:
        description: 'Tag de la release en ModstackApp (ej: v1.1.4)'
        required: true
        default: ''
      repo:
        description: 'Repo del launcher (ej: TuOrg/ModstackApp)'
        required: true
        default: ''

env:
  LAUNCHER_VERSION: ${{ github.event.client_payload.version || inputs.version }}
  LAUNCHER_TAG:     ${{ github.event.client_payload.tag     || inputs.tag }}
  LAUNCHER_REPO:    ${{ github.event.client_payload.repo    || inputs.repo }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build installer (Windows)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Renombrar exe a modstack-setup.exe
        shell: pwsh
        run: |
          $dir = "src-tauri\target\release\bundle\nsis"
          $exe = Get-ChildItem $dir -Filter "*.exe" | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          Write-Host "Encontrado: $($exe.FullName)"
          Copy-Item $exe.FullName "modstack-setup.exe"
          Write-Host "modstack-setup.exe listo"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: modstack-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build installer (macOS universal)
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Renombrar dmg a modstack.dmg
        run: |
          DMG=$(find src-tauri/target -name "*.dmg" | head -1)
          echo "Encontrado: $DMG"
          cp "$DMG" modstack.dmg
          echo "modstack.dmg listo"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: modstack.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build installer (Linux)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Renombrar AppImage a modstack.AppImage
        run: |
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" | grep -v ".sig" | head -1)
          echo "Encontrado: $APPIMAGE"
          cp "$APPIMAGE" modstack.AppImage
          echo "modstack.AppImage listo"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: modstack.AppImage

  upload-to-launcher-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los installers
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Listar artefactos
        run: ls -lh installers/

      - name: Reemplazar binarios en la release de ModstackApp
        env:
          GH_TOKEN: ${{ secrets.INSTALLER_TRIGGER_TOKEN }}
          LAUNCHER_REPO: ${{ env.LAUNCHER_REPO }}
          LAUNCHER_TAG:  ${{ env.LAUNCHER_TAG }}
        run: |
          echo "Subiendo installers a $LAUNCHER_REPO @ $LAUNCHER_TAG"

          # Función helper para reemplazar un asset en la release
          replace_asset() {
            local FILE=$1
            local ASSET_NAME=$2
            local CONTENT_TYPE=$3

            echo "Reemplazando $ASSET_NAME..."

            # Obtener el release id
            RELEASE_ID=$(gh api \
              repos/$LAUNCHER_REPO/releases/tags/$LAUNCHER_TAG \
              --jq '.id')

            # Buscar si ya existe el asset con ese nombre y borrarlo
            ASSET_ID=$(gh api \
              repos/$LAUNCHER_REPO/releases/$RELEASE_ID/assets \
              --jq ".[] | select(.name == \"$ASSET_NAME\") | .id")

            if [ -n "$ASSET_ID" ]; then
              echo "Eliminando asset existente ($ASSET_ID)..."
              gh api -X DELETE repos/$LAUNCHER_REPO/releases/assets/$ASSET_ID
            fi

            # Subir el nuevo asset
            gh release upload $LAUNCHER_TAG \
              installers/$FILE#$ASSET_NAME \
              --repo $LAUNCHER_REPO \
              --clobber

            echo "$ASSET_NAME subido"
          }

          replace_asset "modstack-setup.exe" "modstack-setup.exe" "application/octet-stream"
          replace_asset "modstack.dmg"        "modstack.dmg"        "application/octet-stream"
          replace_asset "modstack.AppImage"   "modstack.AppImage"   "application/octet-stream"

          echo ""
          echo "Todos los installers subidos a la release $LAUNCHER_TAG de $LAUNCHER_REPO"