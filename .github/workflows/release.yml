name: Build & Release Installer

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolver versión y decidir si hay release nueva
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versión en package.json: $TAG"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Disparo manual → se construye $TAG"
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "La release $TAG ya existe → la versión no cambió, se omite."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Versión nueva $TAG → se construye y publica."
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.proceed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Sincronizar versión (package.json → Cargo.toml + tauri.conf.json)
        shell: pwsh
        run: |
          $ver = node -p "require('./package.json').version"
          Write-Host "Sincronizando versión: $ver"

          $cargo = "src-tauri/Cargo.toml"
          $txt = Get-Content $cargo -Raw
          $txt = $txt -replace '(?m)^version = ".*"', "version = `"$ver`""
          [System.IO.File]::WriteAllText($cargo, $txt)

          $conf = "src-tauri/tauri.conf.json"
          $txt = Get-Content $conf -Raw
          $txt = $txt -replace '"version": "[^"]*"', "`"version`": `"$ver`""
          [System.IO.File]::WriteAllText($conf, $txt)

          Write-Host "Cargo.toml:"      ; Select-String -Path $cargo -Pattern '^version = ' | Select-Object -First 1
          Write-Host "tauri.conf.json:" ; Select-String -Path $conf  -Pattern '"version":'   | Select-Object -First 1

      - name: Build portable exe (Windows)
        run: npm run tauri build -- --no-bundle

      - name: Preparar artefacto
        shell: pwsh
        run: |
          $exe = "src-tauri\target\release\modstack-installer.exe"
          if (-not (Test-Path $exe)) {
            throw "No se encontro modstack-installer.exe en target/release"
          }
          Copy-Item $exe "modstack-installer.exe"
          Write-Host "modstack-installer.exe listo"

      - name: Publicar release en este repo
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.check-version.outputs.version }}
        run: |
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:TAG existe → reemplazando asset"
            gh release upload $env:TAG modstack-installer.exe --clobber
          } else {
            Write-Host "Creando release $env:TAG"
            gh release create $env:TAG modstack-installer.exe `
              --title "Modstack Installer $env:TAG" `
              --notes "Instalador portable de Modstack ($env:TAG). Descarga y ejecuta ``modstack-installer.exe``; instalará la última versión del launcher."
          }
